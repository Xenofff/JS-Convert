            faqA2: 'Поскольку JS-Convert не использует дорогостоящие серверные мощности, у нас нет искусственных лимитов, подписок или ограничений на количество файлов в очереди. Вы можете конвертировать пакеты документов абсолютно бесплатно. Главным и единственным ограничителем выступает аппаратная мощность вашего собственного устройства (ПК, ноутбука или смартфона) и объем его оперативной памяти (RAM). Для стабильной обработки тяжелых PDF-документов или изображений в сверхвысоком разрешении рекомендуется использовать устройства с объемом RAM от 8 ГБ. Если браузер закроется во время процесса, это означает, что устройству не хватило памяти для обработки текущего объема данных.',
            faqQ3: 'Насколько безопасно загружать сюда конфиденциальные документы?',
            faqA3: 'Это самый безопасный способ конвертации файлов из всех существующих в интернете. Проект спроектирован по принципу Privacy-First (приватность превыше всего) и полностью соответствует строгим стандартам конфиденциальности, таким как GDPR и 152-ФЗ, прямо из коробки. Ваши персональные данные, сканы паспортов, коммерческие отчеты, базы данных в CSV или личные фотографии физически не могут попасть в чужие руки, потому что они никогда не покидают ваш компьютер. Исходный код проекта полностью открыт и опубликован на GitHub — любой разработчик или специалист по информационной безопасности может провести аудит и убедиться в абсолютной чистоте и прозрачности алгоритмов.',
            faqQ4: 'Почему сервис полностью бесплатный и где подвох?',
            faqA4: 'Никакого подвоха нет. Классические конвертеры вынуждены брать с пользователей плату или вводить жесткие лимиты (например, не более 2 файлов в день), потому что они тратят огромные деньги на аренду мощных серверов и оплату входящего трафика. Архитектура JS-Convert переносит всю вычислительную нагрузку на процессор пользователя. Наши затраты на содержание сайта практически равны нулю, что позволяет нам предоставлять качественный, быстрый и безопасный инструмент без подписок, скрытых платежей и водяных знаков на готовых документах.'
        }
    };

    const FORMAT_OPTIONS = [
        { value: 'image/png', group: 'media' },
        { value: 'image/jpeg', group: 'media' },
        { value: 'image/webp', group: 'media' },
        { value: 'application/pdf', group: 'media' },
        { value: 'application/json', group: 'csv' },
        { value: 'text/csv', group: 'json' }
    ];

    const urlLang = new URLSearchParams(window.location.search).get('lang');
    let currentLang = (urlLang === 'en' || urlLang === 'ru')
        ? urlLang
        : (localStorage.getItem('lang') || (navigator.language.startsWith('ru') ? 'ru' : 'en'));

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('subtitle').textContent = t.subtitle;
        document.getElementById('dropText').textContent = t.drop;
        document.getElementById('btnText').textContent = t.convert;
        document.getElementById('labelTo').textContent = t.labelTo;
        document.getElementById('aboutBtnText').textContent = t.aboutBtn;

        document.getElementById('footerAboutText').textContent = t.footerAbout;
        document.getElementById('footerSecTitle').textContent = t.footerSecTitle;
        document.getElementById('footerSupTitle').textContent = t.footerSupTitle;
        document.getElementById('sec1').textContent = t.sec1;
        document.getElementById('sec2').textContent = t.sec2;
        document.getElementById('sec3').textContent = t.sec3;
        document.getElementById('coffeeTitle').textContent = t.coffeeTitle;
        document.getElementById('copyright').textContent = t.copyright;

        document.getElementById('modalTitle').textContent = t.modalTitle;
        document.getElementById('modalBody').innerHTML = t.modalContent;

        document.getElementById('faqTitle').textContent = t.faqTitle;
        document.getElementById('faqQ1').textContent = t.faqQ1;
        document.getElementById('faqA1').textContent = t.faqA1;
        document.getElementById('faqQ2').textContent = t.faqQ2;
        document.getElementById('faqA2').textContent = t.faqA2;
        document.getElementById('faqQ3').textContent = t.faqQ3;
        document.getElementById('faqA3').textContent = t.faqA3;
        document.getElementById('faqQ4').textContent = t.faqQ4;
        document.getElementById('faqA4').textContent = t.faqA4;

        const incompatibleWarning = document.getElementById('incompatibleWarning');
        if (incompatibleWarning && !incompatibleWarning.classList.contains('hidden')) {
            incompatibleWarning.textContent = t.incompatibleWarning;
        }

        document.getElementById('langEn').className = `px-3 h-8 text-[10px] font-black rounded-lg transition-all ${currentLang === 'en' ? 'bg-white dark:bg-slate-700 shadow-sm text-brand' : 'text-slate-400 hover:text-slate-600'}`;
        document.getElementById('langRu').className = `px-3 h-8 text-[10px] font-black rounded-lg transition-all ${currentLang === 'ru' ? 'bg-white dark:bg-slate-700 shadow-sm text-brand' : 'text-slate-400 hover:text-slate-600'}`;

        // Обновляем текст счетчика файлов если он есть
        const fileCountDisplay = document.getElementById('fileCountDisplay');
        if (fileCountDisplay && !fileCountDisplay.classList.contains('hidden')) {
            const count = selectedFiles.length;
            fileCountDisplay.textContent = `${count} ${t.filesSelected}`;
        }

        lucide.createIcons();
    }

    // --- Theme ---
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    themeToggle.onclick = () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        setTimeout(() => lucide.createIcons(), 10);
    };

    // --- Modal ---
    const aboutModal = document.getElementById('aboutModal');
    document.getElementById('aboutBtn').onclick = () => aboutModal.classList.remove('hidden');
    document.getElementById('closeModal').onclick = () => aboutModal.classList.add('hidden');
    window.onclick = (e) => { if(e.target === aboutModal) aboutModal.classList.add('hidden'); };

    document.getElementById('langEn').onclick = () => { currentLang = 'en'; localStorage.setItem('lang', 'en'); updateUI(); };
    document.getElementById('langRu').onclick = () => { currentLang = 'ru'; localStorage.setItem('lang', 'ru'); updateUI(); };

    updateUI();

    // --- File Handling & Conversion Logic (UI untouched) ---
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const filesList = document.getElementById('filesList');
    const fileCountDisplay = document.getElementById('fileCountDisplay');
    const convertBtn = document.getElementById('convertBtn');
    const targetFormat = document.getElementById('targetFormat');
    const progressInner = document.getElementById('progressInner');
    const conversionStatus = document.getElementById('conversionStatus');
    const incompatibleWarning = document.getElementById('incompatibleWarning');
    const dropzoneIconWrap = document.getElementById('dropzoneIconWrap');

    let selectedFiles = [];
    let fileStatuses = [];
    let dragCounter = 0;

    function classifyFile(file) {
        const name = file.name.toLowerCase();
        const type = file.type;
        if (type.startsWith('image/') || /\.(png|jpe?g|webp|bmp|gif)$/i.test(name)) return 'media';
        if (type === 'application/pdf' || name.endsWith('.pdf')) return 'media';
        if (type === 'application/json' || name.endsWith('.json')) return 'json';
        if (type === 'text/csv' || name.endsWith('.csv')) return 'csv';
        return 'media';
    }

    function getUploadCategory() {
        if (selectedFiles.length === 0) return null;
        const categories = new Set(selectedFiles.map(classifyFile));
        if (categories.size > 1) return 'incompatible';
        return [...categories][0];
    }

    function updateFormatOptions() {
        const category = getUploadCategory();
        const options = targetFormat.querySelectorAll('option');
        let firstEnabled = null;

        FORMAT_OPTIONS.forEach((fmt, idx) => {
            const option = options[idx];
            if (!option) return;
            let enabled = true;
            if (category === 'media') enabled = fmt.group === 'media';
            else if (category === 'json') enabled = fmt.value === 'text/csv';
            else if (category === 'csv') enabled = fmt.value === 'application/json';
            else if (category === 'incompatible') enabled = false;

            option.disabled = !enabled;
            if (enabled && firstEnabled === null) firstEnabled = fmt.value;
        });

        if (firstEnabled && targetFormat.querySelector(`option[value="${targetFormat.value}"]`)?.disabled) {
            targetFormat.value = firstEnabled;
        }

        const incompatible = category === 'incompatible';
        incompatibleWarning.classList.toggle('hidden', !incompatible);
        if (incompatible) {
            incompatibleWarning.textContent = i18n[currentLang].incompatibleWarning;
        }
        convertBtn.disabled = incompatible;
    }

    function setDropzoneDragActive(active) {
        if (active) {
            dropzone.classList.add('scale-[1.02]', 'shadow-xl', 'shadow-indigo-500/10', 'border-brand', 'bg-brand/5');
            dropzoneIconWrap.classList.add('text-brand', 'animate-bounce');
        } else {
            dropzone.classList.remove('scale-[1.02]', 'shadow-xl', 'shadow-indigo-500/10', 'border-brand', 'bg-brand/5');
            dropzoneIconWrap.classList.remove('text-brand', 'animate-bounce');
        }
    }

    function getStatusIconConfig(status) {
        switch (status) {
            case 'converting':
                return { icon: 'loader-2', classes: 'w-4 h-4 text-brand animate-spin flex-shrink-0' };
            case 'success':
                return { icon: 'check-circle', classes: 'w-4 h-4 text-emerald-500 flex-shrink-0' };
            case 'error':
                return { icon: 'x-circle', classes: 'w-4 h-4 text-red-500 flex-shrink-0' };
            default:
                return { icon: 'clock', classes: 'w-4 h-4 text-slate-400 flex-shrink-0' };
        }
    }

    // Открытие проводника при клике на dropzone
    dropzone.addEventListener('click', () => {
        fileInput.click();
    });

    // Обработка выбора файлов через input
    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        if (files.length > 0) {
            addFiles(files);
        }
        fileInput.value = '';
    });

    // Drag & drop
    dropzone.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        if (dragCounter === 1) setDropzoneDragActive(true);
    });

    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
    });

    dropzone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dragCounter--;
        if (dragCounter <= 0) {
            dragCounter = 0;
            setDropzoneDragActive(false);
        }
    });

    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        setDropzoneDragActive(false);
        const files = Array.from(e.dataTransfer.files);
        if (files.length > 0) {
            addFiles(files);
        }
    });

    function addFiles(files) {
        selectedFiles.push(...files);
        files.forEach(() => fileStatuses.push('pending'));
        updateFilesList();
    }

    function updateFilesList() {
        const t = i18n[currentLang];

        if (selectedFiles.length === 0) {
            filesList.classList.add('hidden');
            fileCountDisplay.classList.add('hidden');
            filesList.innerHTML = '';
            fileStatuses = [];
            updateFormatOptions();
            return;
        }

        updateFormatOptions();

        filesList.classList.remove('hidden');
        fileCountDisplay.classList.remove('hidden');

        // Обновляем счетчик
        fileCountDisplay.textContent = `${selectedFiles.length} ${t.filesSelected}`;

        // Создаем список файлов
        filesList.innerHTML = '';
        selectedFiles.forEach((file, index) => {
            const fileItem = document.createElement('div');
            fileItem.className = 'flex items-center justify-between text-xs bg-slate-100 dark:bg-slate-800 rounded-lg px-3 py-1.5';

            const fileInfo = document.createElement('div');
            fileInfo.className = 'flex items-center gap-2 flex-1 min-w-0';

            const fileIcon = document.createElement('i');
            fileIcon.setAttribute('data-lucide', 'file');
            fileIcon.className = 'w-3 h-3 text-slate-500 flex-shrink-0';

            const fileName = document.createElement('span');
            fileName.className = 'truncate text-slate-700 dark:text-slate-300';
            fileName.textContent = file.name;

            const fileSize = document.createElement('span');
            fileSize.className = 'text-slate-400 flex-shrink-0';
            fileSize.textContent = formatFileSize(file.size);

            fileInfo.appendChild(fileIcon);
            fileInfo.appendChild(fileName);

            const removeBtn = document.createElement('button');
            removeBtn.className = 'ml-2 p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded transition-colors flex-shrink-0';
            removeBtn.innerHTML = '<i data-lucide="x" class="w-3 h-3"></i>';
            removeBtn.onclick = (e) => {
                e.stopPropagation();
                selectedFiles.splice(index, 1);
                fileStatuses.splice(index, 1);
                updateFilesList();
            };

            const status = fileStatuses[index] || 'pending';
            const statusCfg = getStatusIconConfig(status);
            const statusIcon = document.createElement('i');
            statusIcon.setAttribute('data-lucide', statusCfg.icon);
            statusIcon.className = statusCfg.classes;
            statusIcon.setAttribute('data-file-index', String(index));

            fileItem.appendChild(fileInfo);
            fileItem.appendChild(fileSize);
            fileItem.appendChild(statusIcon);
            fileItem.appendChild(removeBtn);
            filesList.appendChild(fileItem);
        });

        lucide.createIcons();
    }

    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function clearFiles() {
        selectedFiles = [];
        fileStatuses = [];
        updateFilesList();
    }

    function removeSuccessfulFiles() {
        const keptFiles = [];
        const keptStatuses = [];
        selectedFiles.forEach((file, i) => {
            if (fileStatuses[i] !== 'success') {
                keptFiles.push(file);
                keptStatuses.push(fileStatuses[i] === 'error' ? 'error' : 'pending');
            }
        });
        selectedFiles = keptFiles;
        fileStatuses = keptStatuses;
        updateFilesList();
    }

    function setFileStatus(index, status) {
        fileStatuses[index] = status;
        const icon = filesList.querySelector(`[data-file-index="${index}"]`);
        if (icon) {
            const cfg = getStatusIconConfig(status);
            icon.setAttribute('data-lucide', cfg.icon);
            icon.className = cfg.classes;
            lucide.createIcons();
        }
    }

    // --- Конвертация ---
    convertBtn.addEventListener('click', async () => {
        if (selectedFiles.length === 0) {
            alert(currentLang === 'ru' ? 'Пожалуйста, выберите файлы' : 'Please select files');
            return;
        }

        if (getUploadCategory() === 'incompatible') return;

        const t = i18n[currentLang];
        const targetMime = targetFormat.value;
        const totalFiles = selectedFiles.length;
        let processedFiles = 0;
        let hasErrors = false;

        convertBtn.disabled = true;
        conversionStatus.classList.remove('hidden');
        progressInner.style.width = '0%';

        fileStatuses = fileStatuses.map(s => (s === 'error' ? 'pending' : s));
        updateFilesList();

        const createZip = totalFiles > 1;
        let zip = createZip ? new JSZip() : null;

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            const progress = ((i) / totalFiles) * 100;
            progressInner.style.width = progress + '%';
            conversionStatus.textContent = `${t.converting} ${i + 1} ${t.of} ${totalFiles}: ${file.name}`;

            setFileStatus(i, 'converting');

            try {
                const resultBlob = await convertFile(file, targetMime);

                if (createZip) {
                    const fileName = generateFileName(file.name, targetMime);
                    zip.file(fileName, resultBlob);
                } else {
                    const fileName = generateFileName(file.name, targetMime);
                    downloadBlob(resultBlob, fileName);
                }

                setFileStatus(i, 'success');
                processedFiles++;
            } catch (error) {
                console.error(`Error converting ${file.name}:`, error);
                setFileStatus(i, 'error');
                hasErrors = true;
            }
        }

        progressInner.style.width = '100%';

        if (createZip && processedFiles > 0) {
            conversionStatus.textContent = `${t.converting} ZIP...`;
            try {
                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const zipName = `converted_files_${new Date().getTime()}.zip`;
                downloadBlob(zipBlob, zipName);
                conversionStatus.textContent = t.complete;
            } catch (error) {
                console.error('Error creating ZIP:', error);
                hasErrors = true;
            }
        } else if (processedFiles === 0) {
            conversionStatus.textContent = t.error;
        } else {
            conversionStatus.textContent = t.complete;
        }

        setTimeout(() => {
            updateFormatOptions();
            progressInner.style.width = '0%';
            conversionStatus.classList.add('hidden');
            if (hasErrors) {
                removeSuccessfulFiles();
            } else {
                clearFiles();
            }
        }, 2000);
    });

    async function convertFile(file, targetMime) {
        const fileType = file.type;
        const fileName = file.name;

        if (fileType.startsWith('image/') || fileName.match(/\.(png|jpe?g|webp|bmp|gif)$/i)) {
            return await convertImage(file, targetMime);
        } else if (fileType === 'application/pdf' || fileName.endsWith('.pdf')) {
            if (targetMime === 'application/pdf') {
                return file;
            } else if (targetMime.startsWith('image/')) {
                return await pdfToImage(file, targetMime);
            } else {
                throw new Error('Unsupported conversion from PDF to ' + targetMime);
            }
        } else if (fileType === 'application/json' || fileName.endsWith('.json')) {
            if (targetMime === 'text/csv') {
                return await jsonToCsvBlob(file);
            } else {
                throw new Error('Unsupported conversion from JSON');
            }
        } else if (fileType === 'text/csv' || fileName.endsWith('.csv')) {
            if (targetMime === 'application/json') {
                return await csvToJsonBlob(file);
            } else {
                throw new Error('Unsupported conversion from CSV');
            }
        } else {
            // Пробуем как изображение
            if (targetMime.startsWith('image/')) {
                return await convertImage(file, targetMime);
            } else {
                throw new Error('Unsupported file type');
            }
        }
    }

    function generateFileName(originalName, targetMime) {
        const baseName = originalName.replace(/\.[^/.]+$/, '');
        let extension = '';
        if (targetMime === 'image/png') extension = '.png';
        else if (targetMime === 'image/jpeg') extension = '.jpg';
        else if (targetMime === 'image/webp') extension = '.webp';
        else if (targetMime === 'application/pdf') extension = '.pdf';
        else if (targetMime === 'application/json') extension = '.json';
        else if (targetMime === 'text/csv') extension = '.csv';
        else extension = '';
        return baseName + extension;
    }

    function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // --- Вспомогательные функции конвертации ---
    async function convertImage(blob, targetMime) {
        const img = await loadImageFromBlob(blob);
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        let quality = 0.92;
        if (targetMime === 'image/png') quality = 1;
        return new Promise(resolve => canvas.toBlob(resolve, targetMime, quality));
    }

    function loadImageFromBlob(blob) {
        return new Promise((resolve, reject) => {
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
            img.onerror = reject;
            img.src = url;
        });
    }

    async function pdfToImage(pdfBlob, targetMime) {
        const arrayBuffer = await pdfBlob.arrayBuffer();
        const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: context, viewport }).promise;
        let quality = 0.92;
        if (targetMime === 'image/png') quality = 1;
        return new Promise(resolve => canvas.toBlob(resolve, targetMime, quality));
    }

    async function jsonToCsvBlob(jsonBlob) {
        const text = await jsonBlob.text();
        const json = JSON.parse(text);
        if (!Array.isArray(json) || json.length === 0) throw new Error('JSON must be a non-empty array');
        const headers = Object.keys(json[0]);
        const lines = [headers.join(',')];
        json.forEach(row => {
            const line = headers.map(h => {
                const v = row[h] != null ? row[h] : '';
                const s = String(v).replace(/"/g, '""');
                if (s.includes(',') || s.includes('\n')) return '"' + s + '"';
                return s;
            }).join(',');
            lines.push(line);
        });
        return new Blob([lines.join('\n')], { type: 'text/csv' });
    }

    async function csvToJsonBlob(csvBlob) {
        const text = await csvBlob.text();
        const results = window.Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: true });
        const jsonStr = JSON.stringify(results.data, null, 2);
        return new Blob([jsonStr], { type: 'application/json' });
    }
</script>
